body:
  text: 刻彌陀經疏序孤山圓師撰彌陀經疏後又鈔之名曰西資吾邦未見流行學者憾焉比偶獲義疏訂正鏤刻使學者免傳寫之勞他日若有得鈔者與此疏竝行于世則在西剎行者豈不大資哉竊望焉時正德甲午仲秋旦談峰蓮光院沙門光榮謹書
